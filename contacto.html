<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contacto - Ellel Oversize">
    <title>Contacto | Ellel Oversize</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/global.css">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/component-styles/Header.css">
    <link rel="stylesheet" href="./src/styles/component-styles/Cart.css">
    <link rel="stylesheet" href="./src/styles/component-styles/Checkout.css">
    <link rel="stylesheet" href="./src/styles/component-styles/Contact.css">
    <link rel="stylesheet" href="./src/styles/mobile.css">
    <link rel="stylesheet" href="./src/styles/component-styles/Search.css">
</head>
<body class="bg-light-gray">
    <!-- El fondo gris muy claro se define en base.css o en línea para esta página -->
    <style>
        body.bg-light-gray { background-color: #f8f8f8; }
        .contact-page-container { padding-top: 140px !important; } /* Added for logo clearance */
    </style>

    <div id="app">
        
        <!-- Header Identico, pero con iconos actualizados según el screenshot (lupa, carrito lleno, menu lineas) -->
        <header id="main-header" class="header scrolled">
            <div class="header-container container">
                <a href="index.html" class="logo-link">
                    <img src="./src/assets/img/logo-square.png" alt="Ellel Oversize Logo">
                    <div class="logo-text-wrapper">
                        <span class="logo-text">Ellel Oversize</span>
                        <div class="logo-underline"></div>
                    </div>
                </a>
                
                <div class="header-icons">
                    <button class="icon-btn search-btn" aria-label="Buscar">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <button class="icon-btn cart-btn" aria-label="Carrito" id="open-cart-btn-main">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
                        <span class="cart-badge">0</span>
                    </button>
                    <button class="icon-btn menu-btn-mobile" aria-label="Menú" id="open-menu-btn">
                        <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="contact-page-container mt-xxl container">
            
            <h1 class="contact-title">CONTACTO</h1>

            <div class="contact-form-card">
                <form id="contact-form-main" class="contact-form">
                    <div class="form-row-desktop">
                        <div class="form-group">
                            <input type="text" id="name" name="name" class="form-input" placeholder="Nombre" required>
                        </div>
                        <div class="form-group">
                            <input type="email" id="email" name="email" class="form-input" placeholder="Correo electrónico" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="tel" id="phone" name="phone" class="form-input" placeholder="Teléfono">
                    </div>
                    <div class="form-group">
                        <textarea id="message" name="message" class="form-input textarea" placeholder="Comentario" rows="6" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-submit-contact pulse-anim">ENVIAR MENSAJE</button>
                </form>
            </div>

            <h2 class="location-title mt-xl">Nuestra ubicacion</h2>
            
            <div class="map-container">
                <!-- Embedded Google Map -->
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15906.942761066023!2d-74.0844781!3d4.6401614!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e3f9bd22c2a0b4d%3A0xc3f6e52003d1bd53!2sBogot%C3%A1%2C%20Colombia!5e0!3m2!1sen!2sus!4v1700000000000!5m2!1sen!2sus" 
                    width="100%" 
                    height="500" 
                    style="border:0; border-radius: 4px;" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

        </main>
            <!-- Minimal Footer for Contact Page -->
        <footer class="premium-footer mt-xxl">
            <div class="footer-bottom">
                <p>&copy; 2026 Ellel Oversize. Todos los derechos reservados.</p>
                <a href="privacidad.html" class="terms-link-bottom">Términos y políticas</a>
            </div>
        </footer>
    </div>

    <!-- Modals & Overlays -->
    <div id="cart-container"></div>
    <div id="checkout-container"></div>

    <!-- Mobile Menu Slide-out (Reusing existing logic) -->
    <div class="mobile-menu-overlay" id="mobile-menu">
        <div class="menu-header">
            <img src="./src/assets/img/logo-square.png" alt="Logo">
            <button class="icon-btn" id="close-menu-btn">×</button>
        </div>
        <nav class="mobile-nav">
            <ul class="main-menu-list">
                <li><a href="index.html" class="mobile-link">INICIO</a></li>
                <li><a href="contacto.html" class="mobile-link">CONTACTO</a></li>
                <li><a href="nosotros.html" class="mobile-link">SOBRE NOSOTROS</a></li>
                <li class="has-submenu">
                    <a href="catalogo.html" class="mobile-link">CATALOGO</a>
                    <ul class="submenu-list">
                        <li><a href="catalogo.html?categoria=buzos" class="mobile-sublink">BUZOS</a></li>
                        <li><a href="catalogo.html?categoria=conjuntos" class="mobile-sublink">CONJUNTOS</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- Particle Cursor disabled for this page as per clean design, or we can keep it -->
    <!-- <script src="./src/scripts/particleCursor.js"></script> -->
    <script type="module" src="./src/scripts/index.js"></script>
    
    <!-- Contact Form Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contact-form-main');
            const submitBtn = form.querySelector('.btn-submit-contact');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Animación visual del botón
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'ENVIANDO...';
                if(window.gsap) gsap.to(submitBtn, {scale: 0.95, duration: 0.1, yoyo: true, repeat: 1});

                // Simulación de envío de red
                setTimeout(() => {
                    submitBtn.textContent = '¡MENSAJE ENVIADO!';
                    submitBtn.style.backgroundColor = '#000';
                    submitBtn.style.color = '#fff';
                    
                    form.reset();

                    setTimeout(() => {
                        submitBtn.textContent = originalText;
                        submitBtn.style.backgroundColor = '';
                        submitBtn.style.color = '';
                    }, 3000);
                }, 1000);
            });
        });
    </script>
</body>
</html>
