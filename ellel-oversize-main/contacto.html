<body class="bg-light-gray">
    <!-- El fondo gris muy claro se define en base.css o en línea para esta página -->
    <style>
        body.bg-light-gray {
            background-color: #f8f8f8;
        }

        .contact-page-container {
            padding-top: 140px !important;
        }

        /* Added for logo clearance */
    </style>

    <div id="app">

        <!-- Header Identico, pero con iconos actualizados según el screenshot (lupa, carrito lleno, menu lineas) -->
        <header id="main-header" class="header scrolled">
            <div class="header-container container">
                <a href="index.html" class="logo-link">
                    <img src="./src/assets/img/logo-square.png" alt="Ellel Oversize Logo">
                    <div class="logo-text-wrapper">
                        <span class="logo-text">Ellel Oversize</span>
                        <div class="logo-underline"></div>
                    </div>
                </a>

                <div class="header-icons">
                    <button class="icon-btn search-btn" aria-label="Buscar"><span
                            class="icon-svg search-icon"></span></button>

                    <!-- Auth Icons -->
                    <button class="icon-btn login-btn" id="header-login-btn" aria-label="Iniciar Sesión">
                        <span class="icon-svg user-icon"></span>
                    </button>
                    <button id="header-user-avatar" class="header-avatar-btn" aria-label="Mi cuenta"
                        title="Cerrar sesión" style="display:none;">
                        <img src="" alt="Avatar">
                    </button>

                    <button class="icon-btn cart-btn" aria-label="Carrito" id="open-cart-btn-main">
                        <span class="icon-svg bag-icon"></span>
                        <span class="cart-badge">0</span>
                    </button>
                    <button class="icon-btn menu-btn-mobile" aria-label="Menú" id="open-menu-btn">
                        <span class="icon-svg menu-icon"></span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="contact-page-container mt-xxl container">

            <h1 class="contact-title">CONTACTO</h1>

            <div class="contact-form-card">
                <form id="contact-form-main" class="contact-form">
                    <div class="form-row-desktop">
                        <div class="form-group">
                            <input type="text" id="name" name="name" class="form-input" placeholder="Nombre" required>
                        </div>
                        <div class="form-group">
                            <input type="email" id="email" name="email" class="form-input"
                                placeholder="Correo electrónico" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <input type="tel" id="phone" name="phone" class="form-input" placeholder="Teléfono">
                    </div>
                    <div class="form-group">
                        <textarea id="message" name="message" class="form-input textarea" placeholder="Comentario"
                            rows="6" required></textarea>
                    </div>

                    <button type="submit" class="btn-submit-contact pulse-anim">ENVIAR MENSAJE</button>
                </form>
            </div>

            <h2 class="location-title mt-xl">Nuestra ubicacion</h2>

            <div class="map-container">
                <!-- Embedded Google Map -->

                    width="100%" height="500" style="border:0; border-radius: 4px;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

        </main>

            <p class="policy-text"><a href="privacidad.html" style="text-decoration:underline; color:inherit;">Politicas
                    y privacidad</a></p>
            <div class="social-icons-minimal">

                    </svg></a>
                <a href="https://www.instagram.com" target="_blank" rel="noopener" aria-label="Instagram"><svg

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- Particle Cursor disabled for this page as per clean design, or we can keep it -->
    <!-- <script src="./src/scripts/particleCursor.js"></script> -->
    <script type="module" src="./src/scripts/index.js"></script>

    <!-- Contact Form Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contact-form-main');
            const submitBtn = form.querySelector('.btn-submit-contact');

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                // Animación visual del botón
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'ENVIANDO...';
                if (window.gsap) gsap.to(submitBtn, { scale: 0.95, duration: 0.1, yoyo: true, repeat: 1 });

                // Simulación de envío de red
                setTimeout(() => {
                    submitBtn.textContent = '¡MENSAJE ENVIADO!';
                    submitBtn.style.backgroundColor = '#000';
                    submitBtn.style.color = '#fff';

                    form.reset();

                    setTimeout(() => {
                        submitBtn.textContent = originalText;
                        submitBtn.style.backgroundColor = '';
                        submitBtn.style.color = '';
                    }, 3000);
                }, 1000);
            });
        });
    </script>
</body>
